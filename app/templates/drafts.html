{% extends "base.html" %}
{% block content %}
<div class="top">
  <div>
    <h1>Черновики</h1>
    <div class="muted">Посты, созданные нейросетью</div>
  </div>
</div>

<form class="toolbar" method="get" action="/drafts">
  <select style="max-width:220px" name="status_filter">
    {% for value, label in [("pending","На проверке"),("published","Опубликованные"),("rejected","Отклоненные"),("all","Все")] %}
      <option value="{{ value }}" {% if status_filter == value %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
  <button type="submit">Показать</button>
</form>

<section class="table">
  <table>
    <thead><tr><th>ID</th><th>Товар</th><th>Статус</th><th>Стиль</th><th>Дата</th></tr></thead>
    <tbody>
      {% for draft in drafts %}
      <tr>
        <td>#{{ draft.id }}</td>
        <td>#{{ draft.product_id }}</td>
        <td><span class="pill gold">{{ draft.status }}</span></td>
        <td>{{ draft.style }}</td>
        <td>{{ draft.created_at.strftime("%d.%m.%Y %H:%M") }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
