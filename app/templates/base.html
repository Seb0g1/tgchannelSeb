<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ brand_name }} Admin</title>
  <style>
    :root {
      --bg: #10131d;
      --panel: #181c29;
      --panel-2: #202637;
      --text: #f5f0e8;
      --muted: #a8adbd;
      --line: #30384d;
      --gold: #d9b66d;
      --rose: #e7a6b7;
      --green: #84d2a6;
      --red: #ff8c8c;
      --blue: #91b8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, #29314a 0, #10131d 34rem);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    a { color: inherit; text-decoration: none; }
    .layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    aside { border-right: 1px solid var(--line); padding: 24px 18px; background: rgba(16, 19, 29, .82); position: sticky; top: 0; height: 100vh; }
    main { padding: 28px; }
    .brand { font-size: 21px; font-weight: 800; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    nav a { display: block; color: var(--muted); padding: 10px 12px; border-radius: 8px; margin-bottom: 5px; }
    nav a:hover, nav a.active { background: var(--panel-2); color: var(--text); }
    .top { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 22px; }
    h1 { margin: 0; font-size: 28px; }
    h2 { margin: 0 0 14px; font-size: 18px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .card, .table, form.panel { background: rgba(24, 28, 41, .92); border: 1px solid var(--line); border-radius: 8px; }
    .card { padding: 18px; }
    .metric { color: var(--muted); font-size: 13px; }
    .number { font-size: 30px; font-weight: 800; margin-top: 4px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    input, select, textarea {
      width: 100%;
      background: #111622;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
    }
    textarea { min-height: 140px; resize: vertical; }
    button, .btn {
      background: var(--gold);
      color: #17130a;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 750;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
    }
    .btn.secondary, button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
    .btn.danger, button.danger { background: #3a1f29; color: var(--red); border: 1px solid #633142; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-size: 12px; font-weight: 650; }
    tr:hover td { background: rgba(255,255,255,.025); }
    .pill { display: inline-flex; padding: 4px 8px; border-radius: 999px; background: var(--panel-2); color: var(--muted); font-size: 12px; }
    .pill.green { color: var(--green); }
    .pill.red { color: var(--red); }
    .pill.gold { color: var(--gold); }
    .muted { color: var(--muted); }
    .stack { display: grid; gap: 16px; }
    .two { display: grid; grid-template-columns: 1.2fr .8fr; gap: 18px; }
    .panel { padding: 18px; }
    .image { width: 92px; height: 92px; object-fit: cover; border-radius: 8px; background: #0d111b; border: 1px solid var(--line); }
    .pagination { display: flex; gap: 10px; margin-top: 16px; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      aside { height: auto; position: static; }
      .grid, .two { grid-template-columns: 1fr; }
      main { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">{{ brand_name }}</div>
      <div class="sub">панель Telegram-канала</div>
      <nav>
        <a href="/">Дашборд</a>
        <a href="/products">Товары</a>
        <a href="/drafts">Черновики</a>
        <a href="/emojis">Premium эмодзи</a>
      </nav>
    </aside>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
